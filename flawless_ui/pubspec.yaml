  flawless_material3_theme: ^0.1.0-alpha.2
  flawless_glass_theme: ^0.1.0-alpha.2
  flawless_glass_components: ^0.1.0-alpha.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

