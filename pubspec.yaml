name: flawless_workspace
publish_to: none

environment:
  sdk: ^3.6.0

workspace:
  - flawless_cli
  - flawless_core
  - flawless_glass_components
  - flawless_glass_theme
  - flawless_material3_components
  - flawless_material3_theme
  - flawless_theme
  - flawless_ui
  

dev_dependencies:
  melos: ^7.0.0

melos:
  scripts:
    get:
      run: melos exec --fail-fast -- "flutter pub get"
      description: Install dependencies across all packages.
    sync:suite-version:
      run: melos exec --scope="flawless_cli" -- "dart run tool/sync_suite_version.dart"
      description: Sync flawless_cli suite version constant from flawless_cli/pubspec.yaml.
    analyze:
      run: melos exec --fail-fast --ignore="flawless_app,test_app" -- "dart analyze ."
      description: Run static analysis across all packages.
    format:verify:
      run: melos exec --fail-fast --ignore="flawless_app,test_app" -- "dart format --output=none --set-exit-if-changed ."
      description: Verify formatting (no changes) across publishable packages.
    format:
      run: melos exec --ignore="flawless_app,test_app" -- "dart format ."
      description: Fix and apply formatting across all packages.
    test:
      run: melos run test:dart && melos run test:flutter
      description: Run all tests across Dart and Flutter packages.
    test:dart:
      run: melos exec --fail-fast --ignore="flawless_app,test_app" --no-flutter -- "dart test"
      description: Run Dart tests for non-Flutter packages.
    test:flutter:
      run: melos exec --fail-fast --ignore="flawless_app,test_app" --flutter -- "flutter test"
      description: Run Flutter widget/unit tests for Flutter packages.
    publish:dry-run:
      run: melos exec --fail-fast --ignore="flawless_app,test_app" -- "dart pub publish --dry-run"
      description: Run pub publish dry-run across publishable packages.
    preflight:
      run: melos run get && melos run sync:suite-version && melos run analyze && melos run format:verify && melos run test && melos run publish:dry-run
      description: Alpha release preflight (get, version sync, analyze, format verify, test, publish dry-run).
    ship:
      run: melos version --yes && melos run sync:suite-version && git add . && git commit --amend --no-edit && git push origin main --follow-tags --force && melos publish --no-dry-run --yes
      description: Bump versions, sync Dart constant, push to GitHub, and publish to Pub.dev.